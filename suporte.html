<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu projeto prático</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/suporte.css">
    <link rel="shortcut icon" href="img/icone.png" type="image/x-icon">
</head>
<body>
    <!-- Navegador superior -->
  <header class="header-page">
        <div class="container header-container">
            <h1 class="bi bi-controller">Zizack Games <img src="img/icone.png" class="icone" alt="icone"></h1>
            <nav>
                <ul class="header-menu">
                    <li><a href="index.html" class="item-menu">Home</a></li>
                    <li><a href="loja.html" class="item-menu">Loja</a></li>
                    <li><a href="suporte.html" class="item-menu">Suporte</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Conteúdo -->
    <div class="contato-container">

    <div class="glow pink"></div>
    <div class="glow blue"></div>

    <form class="contato-form">

        <h2>Contato <span>Gamer</span></h2>
        <p>Envie sua mensagem para nossa equipe.</p>

        <label>Nome Completo</label>
        <input type="text" placeholder="Ex: João" required>

        <label>Sua Mensagem</label>
        <textarea placeholder="Como ajudamos?" rows="5" required></textarea>

        <button type="submit">Enviar</button>

    </form>

    </div>


    <!--Rodapé -->
    <footer class="footer">
        <div class="container-rodape" style="display: flex; justify-content: space-between; padding: 60px 0; border-top: 1px solid #30363d;">
            <div class="footer-brand">
                <h2>Zizack Games</h2>
                <p>Tudo o que você procura, em um só lugar.</p>
            </div>
            <div class="footer-social">
                <h4>Redes Sociais</h4>
                <p><i class="bi bi-instagram"></i> <i class="bi bi-discord"></i></p>
            </div>
        </div>
    </footer>

    
    
    <script src="js/script.js"></script>
</body>
</html>
